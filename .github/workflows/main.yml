name: Windows Full Build and Upload

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to Path
      uses: microsoft/setup-msbuild@v2

    - name: Install Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: "2.2.2"
        with-cache: true

    - name: Download and Install Lazarus i386 Cross-Compiler
      run: |
        $lazbuildPath = (Get-Command lazbuild.exe).Source
        $lazDir = Split-Path -Parent $lazbuildPath
        $url = "https://downloads.sourceforge.net/project/lazarus/Lazarus%20Windows%2064%20bits/Lazarus%202.2.2/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe"
        curl.exe -L -o "lazarus-cross-installer.exe" $url
        Start-Process -FilePath ".\lazarus-cross-installer.exe" -ArgumentList "/VERYSILENT /SP- /DIR=$lazDir" -Wait
      shell: pwsh
      
    - name: Find Project Path and Rename UI
      run: |
        # 1. Locate the project folder
        $lpiFile = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
        if ($null -eq $lpiFile) {
            $path = $ExecutionActionPreference = "Continue"; $pwd.Path # Fallback to root
        } else {
            $path = $lpiFile.Directory.FullName
        }
        
        # 2. Set the environment variable properly for GitHub Actions
        "PROJECT_DIR=$path" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Host "Project Directory set to: $path"

        # 3. Replace UI Strings
        $replacements = @{
            "Cheat Engine 7.6" = "Nocis Happy Tool 7.6"
            "Cheat Engine"     = "Nocis Happy Tool"
        }

        Get-ChildItem -Path $path -Recurse -Include "*.lpi", "*.lua", "*.pas", "*.lfm", "*.lpr", "*.sln" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            foreach ($old in $replacements.Keys) {
                $content = $content -replace [regex]::Escape($old), $replacements[$old]
            }
            Set-Content $_.FullName $content
        }
      shell: pwsh

    - name: Build Pascal Components (Lazarus)
      run: |
        # Use the env variable we just created
        $ce = "${{ env.PROJECT_DIR }}"
        
        lazbuild.exe "$ce\cheatengine.lpi" --build-mode="Release 64-Bit"
        lazbuild.exe "$ce\cheatengine.lpi" --build-mode="Release 32-Bit"
        
        if (Test-Path "$ce\luaclient\luaclient.lpi") {
          lazbuild.exe "$ce\luaclient\luaclient.lpi" --build-mode="Release 64-Bit"
          lazbuild.exe "$ce\luaclient\luaclient.lpi" --build-mode="Release 32-Bit"
        }
        
        if (Test-Path "$ce\speedhack\speedhack.lpi") {
          lazbuild.exe "$ce\speedhack\speedhack.lpi" --build-mode="Release 64-Bit"
          lazbuild.exe "$ce\speedhack\speedhack.lpi" --build-mode="Release 32-Bit"
        }

        if (Test-Path "$ce\vehdebug\vehdebug.lpi") {
          lazbuild.exe "$ce\vehdebug\vehdebug.lpi" --build-mode="Release 64-Bit"
          lazbuild.exe "$ce\vehdebug\vehdebug.lpi" --build-mode="Release 32-Bit"
        }
      shell: cmd

    - name: Build C++ Components (MSBuild)
      run: |
        $ce = "${{ env.PROJECT_DIR }}"
        $solutions = @(
          "DirectXMess\DirectXMess.sln",
          "DotNetCompiler\DotNetCompiler.sln",
          "MonoDataCollector\MonoDataCollector.sln",
          "DotNetDataCollector\DotNetDataCollector.sln",
          "DotNetInvasiveDataCollector\DotNetInvasiveDataCollector.sln",
          "cejvmti\cejvmti.sln",
          "tcclib\tcclib.sln"
        )

        foreach ($sln in $solutions) {
          $slnPath = Join-Path $ce $sln
          if (Test-Path $slnPath) {
            Write-Host "Building $sln..."
            msbuild.exe $slnPath /p:Configuration=Release /p:Platform=x64
            msbuild.exe $slnPath /p:Configuration=Release /p:Platform=Win32
          }
        }
      shell: pwsh

    - name: Build DBK Kernel Driver
      run: |
        $dbkPath = Join-Path "${{ env.PROJECT_DIR }}" "dbkkernel\dbkkernel.sln"
        if (Test-Path $dbkPath) {
           msbuild.exe $dbkPath /p:Configuration="Release No-Sig" /p:Platform=x64
        }
      shell: pwsh

    - name: Rename Main EXEs and Binary Patch
      run: |
        $binPath = Join-Path "${{ env.PROJECT_DIR }}" "bin"
        if (-not (Test-Path $binPath)) { Write-Error "Bin folder not found!"; exit 1 }
        cd $binPath

        # 1. Rename EXEs
        Get-ChildItem -Filter "cheatengine*.exe" | ForEach-Object {
            $newName = $_.Name -replace "cheatengine", "nocishappytool"
            Rename-Item $_.FullName $newName
        }

        # 2. Binary Patch Strings
        function Replace-Bytes {
            param ([byte[]]$Bytes, [string]$OldStr, [string]$NewStr)
            $oldB = [System.Text.Encoding]::ASCII.GetBytes($OldStr)
            $newB_raw = [System.Text.Encoding]::ASCII.GetBytes($NewStr)
            $newB = New-Object byte[] $oldB.Length
            $copyLen = [Math]::Min($newB_raw.Length, $oldB.Length)
            [Array]::Copy($newB_raw, $newB, $copyLen)
            for ($i = 0; $i -le ($Bytes.Length - $oldB.Length); $i++) {
                $match = $true
                for ($j = 0; $j -lt $oldB.Length; $j++) {
                    if ($Bytes[$i + $j] -ne $oldB[$j]) { $match = $false; break }
                }
                if ($match) {
                    for ($k = 0; $k -lt $oldB.Length; $k++) { $Bytes[$i + $k] = $newB[$k] }
                    $i += $oldB.Length - 1
                }
            }
            return $Bytes
        }

        Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $data = [System.IO.File]::ReadAllBytes($_.FullName)
            $data = Replace-Bytes -Bytes $data -OldStr "Cheat Engine" -NewStr "Nocis Happy Tool"
            [System.IO.File]::WriteAllBytes($_.FullName, $data)
        }
      shell: pwsh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Full-Compiled-Binaries
        path: ${{ env.PROJECT_DIR }}/bin/

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
          $binFiles = Join-Path "${{ env.PROJECT_DIR }}" "bin\*"
          7z a nocishappytool-full.zip $binFiles
          $tag = "7.5.0.${{ github.run_number }}"
          gh release create $tag .\nocishappytool-full.zip --title "Build $tag (Full)" --notes "Automated full build with all collectors and drivers."
      shell: pwsh
