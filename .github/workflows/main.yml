name: Windows Full Build and Upload

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to Path
      uses: microsoft/setup-msbuild@v2

    - name: Install Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: "2.2.2"
        with-cache: true

    - name: Download and Install Lazarus i386 Cross-Compiler
      run: |
        $lazbuildPath = (Get-Command lazbuild.exe).Source
        $lazDir = Split-Path -Parent $lazbuildPath
        $url = "https://downloads.sourceforge.net/project/lazarus/Lazarus%20Windows%2064%20bits/Lazarus%202.2.2/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe"
        curl.exe -L -o "lazarus-cross-installer.exe" $url
        Start-Process -FilePath ".\lazarus-cross-installer.exe" -ArgumentList "/VERYSILENT /SP- /DIR=$lazDir" -Wait
      shell: pwsh
      
    - name: Find Project Root and Rename Branding
      run: |
        $lpiFile = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
        $path = $lpiFile.Directory.FullName
        "PROJECT_DIR=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

        $replacements = @{
            "Cheat Engine 7.6" = "Nocis Happy Tool 7.6"
            "Cheat Engine"     = "Nocis Happy Tool"
        }

        Get-ChildItem -Path $path -Recurse -Include "*.lpi", "*.lua", "*.pas", "*.lfm", "*.lpr", "*.sln", "*.vcxproj", "*.csproj" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            foreach ($old in $replacements.Keys) {
                $content = $content -replace [regex]::Escape($old), $replacements[$old]
            }
            $content = $content -replace "<TargetFrameworkVersion>v4.0</TargetFrameworkVersion>", "<TargetFrameworkVersion>v4.8</TargetFrameworkVersion>"
            Set-Content $_.FullName $content
        }
      shell: pwsh

    - name: Build Pascal Components (Lazarus)
      run: |
        $ce = $env:PROJECT_DIR
        cd $ce
        & lazbuild.exe "cheatengine.lpi" --build-mode="Release 64-Bit"
        & lazbuild.exe "cheatengine.lpi" --build-mode="Release 32-Bit"
        
        $subprojs = @("luaclient\luaclient.lpi", "speedhack\speedhack.lpi", "vehdebug\vehdebug.lpi")
        foreach ($p in $subprojs) {
            $ppath = Join-Path $ce $p
            if (Test-Path $ppath) {
                & lazbuild.exe $ppath --cpu=x86_64 --os=win64
                & lazbuild.exe $ppath --cpu=i386 --os=win32
            }
        }
      shell: pwsh

    - name: Build Standard C++ Components (MSBuild)
      run: |
        $ce = $env:PROJECT_DIR
        $msArgs = @("/p:Configuration=Release", "/p:PlatformToolset=v143", "/p:WindowsTargetPlatformVersion=10.0")

        $solutions = @(
          "DirectXMess\DirectXMess.sln",
          "DotNetCompiler\DotNetCompiler.sln",
          "MonoDataCollector\MonoDataCollector.sln",
          "DotNetDataCollector\DotNetDataCollector.sln",
          "cejvmti\cejvmti.sln"
        )

        foreach ($sln in $solutions) {
          $slnPath = Join-Path $ce $sln
          if (Test-Path $slnPath) {
            & msbuild.exe $slnPath /t:Restore
            & msbuild.exe $slnPath $msArgs /p:Platform=x64
            & msbuild.exe $slnPath $msArgs /p:Platform=Win32
          }
        }
      shell: pwsh

    - name: Build TCC Components (Dedicated Step)
      run: |
        $ce = $env:PROJECT_DIR
        $tccSln = Join-Path $ce "tcclib\win32\tcc\tcc.sln"
        
        # We must force the WindowsTargetPlatformVersion and PlatformToolset 
        # to override the hardcoded values in the vcxproj file.
        $tccArgs = @(
            "/p:PlatformToolset=v143",
            "/p:WindowsTargetPlatformVersion=10.0"
        )

        if (-not (Test-Path $tccSln)) {
            Write-Error "TCC Solution not found at $tccSln"
            exit 1
        }

        Write-Host "Building TCC x64 (tcc64-64.dll)..."
        & msbuild.exe $tccSln /t:Restore
        & msbuild.exe $tccSln $tccArgs /p:Configuration="Output to 64 (Release)" /p:Platform=x64

        Write-Host "Building TCC x86 (tcc32-32.dll)..."
        & msbuild.exe $tccSln $tccArgs /p:Configuration="Output to 32 (Release)" /p:Platform=Win32
      shell: pwsh

    - name: Final Consolidation
      run: |
        $ce = $env:PROJECT_DIR
        $outDir = Join-Path $env:GITHUB_WORKSPACE "FullBuild"
        if (Test-Path $outDir) { Remove-Item $outDir -Recurse -Force }
        New-Item -ItemType Directory -Path $outDir -Force

        # 1. Main bin
        $ceBin = Join-Path $ce "bin"
        if (Test-Path $ceBin) { Copy-Item -Path "$ceBin\*" -Destination $outDir -Recurse -Force }

        # 2. Aggressive search for TCC, luaclient, and others
        Write-Host "Searching for all built DLLs..."
        $patterns = @("tcc*.dll", "luaclient*.dll", "speedhack*.dll", "vehdebug*.dll", "*DataCollector*.dll")
        foreach ($pattern in $patterns) {
            Get-ChildItem -Path $ce -Recurse -Filter $pattern | Where-Object { $_.FullName -notmatch "obj|ipch" } | ForEach-Object {
                if (-not (Test-Path (Join-Path $outDir $_.Name))) {
                    Copy-Item $_.FullName $outDir -Force
                    Write-Host "Captured: $($_.Name) from $($_.DirectoryName)"
                }
            }
        }

        # 3. Resources
        $folders = @("lua", "languages", "autorun", "win32")
        foreach ($f in $folders) {
            $fPath = Join-Path $ce $f
            if (Test-Path $fPath) { Copy-Item -Path $fPath -Destination $outDir -Recurse -Force }
        }
        if (Test-Path (Join-Path $ce "defines.lua")) { Copy-Item (Join-Path $ce "defines.lua") $outDir -Force }

        "FINAL_BIN=$outDir" | Out-File -FilePath $env:GITHUB_ENV -Append
      shell: pwsh

    - name: Rename EXEs and Binary Patch
      run: |
        $binPath = $env:FINAL_BIN
        cd $binPath

        # Rename main EXEs
        Get-ChildItem -Filter "cheatengine*.exe" | ForEach-Object {
            $newName = $_.Name -replace "cheatengine", "nocishappytool"
            Rename-Item $_.FullName $newName
        }

        function Patch-File {
            param($FilePath)
            $bytes = [System.IO.File]::ReadAllBytes($FilePath)
            $oldB = [System.Text.Encoding]::ASCII.GetBytes("Cheat Engine")
            $newB = [System.Text.Encoding]::ASCII.GetBytes("Nocis Happy Tool")
            $finalNewB = New-Object byte[] $oldB.Length
            [Array]::Copy($newB, $finalNewB, [Math]::Min($newB.Length, $oldB.Length))
            $mod = $false
            for ($i = 0; $i -le ($bytes.Length - $oldB.Length); $i++) {
                $match = $true
                for ($j = 0; $j -lt $oldB.Length; $j++) { if ($bytes[$i+$j] -ne $oldB[$j]) { $match = $false; break } }
                if ($match) { 
                    for ($k = 0; $k -lt $oldB.Length; $k++) { $bytes[$i+$k] = $finalNewB[$k] }
                    $mod = $true
                }
            }
            if ($mod) { [System.IO.File]::WriteAllBytes($FilePath, $bytes) }
        }

        Get-ChildItem -Include "*.exe", "*.dll" -Recurse | ForEach-Object { Patch-File $_.FullName }
      shell: pwsh
      
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Nocis-Happy-Tool-Full-Build
        path: ${{ env.FINAL_BIN }}/

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
          $binDir = $env:FINAL_BIN
          Compress-Archive -Path "$binDir\*" -DestinationPath "nocishappytool-full.zip"
          $tag = "v7.6.${{ github.run_number }}"
          gh release create $tag .\nocishappytool-full.zip --title "Build $tag" --notes "Full build: Includes luaclient and tcc64-64.dll."
      shell: pwsh
