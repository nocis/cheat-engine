name: Windows Full Build and Upload

on:
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to Path
      uses: microsoft/setup-msbuild@v2

    - name: Install Lazarus
      uses: gcarreno/setup-lazarus@v3
      with:
        lazarus-version: "2.2.2"
        with-cache: true

    - name: Download and Install Lazarus i386 Cross-Compiler
      run: |
        $lazbuildPath = (Get-Command lazbuild.exe).Source
        $lazDir = Split-Path -Parent $lazbuildPath
        $url = "https://downloads.sourceforge.net/project/lazarus/Lazarus%20Windows%2064%20bits/Lazarus%202.2.2/lazarus-2.2.2-fpc-3.2.2-cross-i386-win32-win64.exe"
        curl.exe -L -o "lazarus-cross-installer.exe" $url
        Start-Process -FilePath ".\lazarus-cross-installer.exe" -ArgumentList "/VERYSILENT /SP- /DIR=$lazDir" -Wait
      shell: pwsh
      
    - name: Find Project Path and Rename UI
      run: |
        $lpiFile = Get-ChildItem -Recurse -Filter "cheatengine.lpi" | Select-Object -First 1
        if ($null -eq $lpiFile) { $path = $pwd.Path } else { $path = $lpiFile.Directory.FullName }
        "PROJECT_DIR=$path" | Out-File -FilePath $env:GITHUB_ENV -Append

        $replacements = @{
            "Cheat Engine 7.6" = "LLL ABX"
            "Cheat Engine"     = "Nocis Happy Tool"
        }

        Get-ChildItem -Path $path -Recurse -Include "*.lpi", "*.lua", "*.pas", "*.lfm", "*.lpr", "*.sln", "*.vcxproj" | ForEach-Object {
            $content = Get-Content $_.FullName -Raw
            foreach ($old in $replacements.Keys) {
                $content = $content -replace [regex]::Escape($old), $replacements[$old]
            }
            Set-Content $_.FullName $content
        }
      shell: pwsh

    - name: Build Pascal Components (Lazarus)
      run: |
        $ce = $env:PROJECT_DIR
        & lazbuild.exe "$ce\cheatengine.lpi" --build-mode="Release 64-Bit"
        & lazbuild.exe "$ce\cheatengine.lpi" --build-mode="Release 32-Bit"
        
        $subprojs = @("luaclient\luaclient.lpi", "speedhack\speedhack.lpi", "vehdebug\vehdebug.lpi")
        foreach ($p in $subprojs) {
            $ppath = Join-Path $ce $p
            if (Test-Path $ppath) {
                & lazbuild.exe $ppath --build-mode=Release --cpu=x86_64 --os=win64
                & lazbuild.exe $ppath --build-mode=Release --cpu=i386 --os=win32
            }
        }
      shell: pwsh

    - name: Build C++ Components (MSBuild Retargeted)
      run: |
        $ce = $env:PROJECT_DIR
        
        # We force the Toolset to v143 (VS2022) and SDK to 10.0
        $msArgs = "/p:Configuration=Release /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0"

        $solutions = @(
          "DirectXMess\DirectXMess.sln",
          "DotNetCompiler\DotNetCompiler.sln",
          "MonoDataCollector\MonoDataCollector.sln",
          "DotNetDataCollector\DotNetDataCollector.sln",
          "cejvmti\cejvmti.sln",
          "tcclib\tcclib.sln"
        )

        foreach ($sln in $solutions) {
          $slnPath = Join-Path $ce $sln
          if (Test-Path $slnPath) {
            Write-Host "--- Building $sln ---"
            msbuild.exe $slnPath $msArgs /p:Platform=x64
            msbuild.exe $slnPath $msArgs /p:Platform=Win32
          }
        }

        # Special Case: DotNetInvasiveDataCollector (Usually AnyCPU)
        $dnInvasive = Join-Path $ce "DotNetInvasiveDataCollector\DotNetInvasiveDataCollector.sln"
        if (Test-Path $dnInvasive) {
            msbuild.exe $dnInvasive /p:Configuration=Release /p:Platform="Any CPU"
        }
      shell: pwsh

    - name: Build DBK Kernel Driver
      run: |
        $dbkPath = Join-Path $env:PROJECT_DIR "dbkkernel\dbkkernel.sln"
        if (Test-Path $dbkPath) {
           # Retargeting drivers is risky but necessary here
           msbuild.exe $dbkPath /p:Configuration="Release No-Sig" /p:Platform=x64 /p:PlatformToolset=WindowsKernelModeDriver15.0 /p:WindowsTargetPlatformVersion=10.0
        }
      shell: pwsh

    - name: Rename Main EXEs and Binary Patch
      run: |
        $binPath = Join-Path $env:PROJECT_DIR "bin"
        if (-not (Test-Path $binPath)) { throw "Bin folder not found" }
        cd $binPath

        Get-ChildItem -Filter "cheatengine*.exe" | ForEach-Object {
            $newName = $_.Name -replace "cheatengine", "nocishappytool"
            Rename-Item $_.FullName $newName
        }

        function Replace-Bytes {
            param ([byte[]]$Bytes, [string]$OldStr, [string]$NewStr)
            $oldB = [System.Text.Encoding]::ASCII.GetBytes($OldStr); $newB_raw = [System.Text.Encoding]::ASCII.GetBytes($NewStr)
            $newB = New-Object byte[] $oldB.Length; [Array]::Copy($newB_raw, $newB, ([Math]::Min($newB_raw.Length, $oldB.Length)))
            for ($i = 0; $i -le ($Bytes.Length - $oldB.Length); $i++) {
                $match = $true; for ($j = 0; $j -lt $oldB.Length; $j++) { if ($Bytes[$i + $j] -ne $oldB[$j]) { $match = $false; break } }
                if ($match) { for ($k = 0; $k -lt $oldB.Length; $k++) { $Bytes[$i + $k] = $newB[$k] }; $i += $oldB.Length - 1 }
            }
            return $Bytes
        }

        Get-ChildItem -Filter "*.exe" | ForEach-Object {
            $data = [System.IO.File]::ReadAllBytes($_.FullName)
            $data = Replace-Bytes -Bytes $data -OldStr "Cheat Engine" -NewStr "Nocis Happy Tool"
            [System.IO.File]::WriteAllBytes($_.FullName, $data)
        }
      shell: pwsh
      
    - name: Upload Artifact
      uses: actio
